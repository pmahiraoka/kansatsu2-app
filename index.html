<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>かんさつきろくアプリ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Hiragino Maru Gothic Pro', sans-serif;
    background: #e8f5e9;
    min-height: 100vh;
    padding: 16px;
  }

  h1 {
    text-align: center;
    font-size: 1.4rem;
    color: #2e7d32;
    margin-bottom: 16px;
  }

  .form-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    max-width: 700px;
    margin: 0 auto 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.10);
  }

  .form-row { margin-bottom: 18px; }

  .field-label {
    display: block;
    font-size: 1rem;
    font-weight: bold;
    color: #388e3c;
    margin-bottom: 8px;
  }

  input[type="date"], textarea, select {
    width: 100%;
    font-family: inherit;
    font-size: 1rem;
    border: 2px solid #a5d6a7;
    border-radius: 10px;
    padding: 10px 12px;
    outline: none;
    background: #f9fbe7;
    color: #333;
    -webkit-appearance: none;
    appearance: none;
  }
  textarea { min-height: 90px; resize: vertical; }

  /* ── 写真エリア ── */
  .photo-wrap {
    position: relative;
    width: 100%;
  }
  .photo-label-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    min-height: 150px;
    border: 3px dashed #a5d6a7;
    border-radius: 14px;
    background: #f1f8e9;
    cursor: pointer;
    padding: 16px;
  }
  .photo-label-btn img {
    max-width: 100%;
    max-height: 200px;
    border-radius: 10px;
    display: block;
  }
  .photo-icon { font-size: 2.5rem; }
  .photo-text { font-size: 0.95rem; color: #555; }
  .photo-sub  { font-size: 0.8rem;  color: #888; }
  /* input[type=file] はlabelの中に隠す */
  .photo-label-btn input[type="file"] {
    display: none;
  }

  /* ── 選択ボタン ── */
  .choice-group { display: flex; flex-wrap: wrap; gap: 10px; }
  .choice-group label {
    display: inline-block;
    background: #f1f8e9;
    border: 2px solid #c5e1a5;
    border-radius: 50px;
    padding: 10px 18px;
    font-size: 1rem;
    font-family: inherit;
    cursor: pointer;
    color: #333;
    -webkit-tap-highlight-color: transparent;
  }
  .choice-group input[type="radio"] {
    display: none;
  }
  .choice-group input[type="radio"]:checked + span {
    /* spanのスタイルはJS制御 */
  }
  /* JS で .active を付与 */
  .choice-group label.active {
    background: #2e7d32 !important;
    border-color: #1b5e20 !important;
    color: #fff !important;
    font-weight: bold;
  }

  /* ── ボタン ── */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
  .btn {
    font-family: inherit;
    font-size: 1rem;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    padding: 12px 24px;
    cursor: pointer;
    color: white;
  }
  .btn-green  { background: #43a047; }
  .btn-red    { background: #e53935; }
  .btn-orange { background: #fb8c00; }
  .btn-blue   { background: #1e88e5; }
  .btn-purple { background: #8e24aa; }

  /* ── スライド ── */
  #slide-list { max-width: 960px; margin: 0 auto 20px; }
  .list-title { font-size: 1.1rem; color: #2e7d32; font-weight: bold; margin-bottom: 10px; }

  .slide {
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .slide-header {
    background: #2e7d32;
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .slide-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 300px;
  }
  .slide-photo {
    background: #f1f8e9;
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 2px solid #c8e6c9;
    padding: 12px;
  }
  .slide-photo img {
    max-width: 100%;
    max-height: 280px;
    border-radius: 8px;
    object-fit: contain;
    display: block;
  }
  .slide-photo .no-photo { color: #bbb; font-size: 0.9rem; text-align: center; }
  .slide-text { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
  .obs-item { display: flex; flex-direction: column; gap: 3px; }
  .obs-q { font-size: 0.8rem; color: #777; font-weight: bold; }
  .obs-a {
    background: #e8f5e9;
    border-left: 4px solid #66bb6a;
    border-radius: 0 8px 8px 0;
    padding: 5px 10px;
    font-size: 0.95rem;
    color: #1b5e20;
    font-weight: bold;
  }
  .obs-free {
    background: #fffde7;
    border-left: 4px solid #ffd54f;
    border-radius: 0 8px 8px 0;
    padding: 8px 10px;
    font-size: 0.9rem;
    color: #333;
    white-space: pre-wrap;
    flex: 1;
  }
  .del-btn {
    background: #e53935; color: white;
    font-size: 0.75rem; padding: 4px 12px;
    border-radius: 50px; border: none;
    cursor: pointer; margin-left: 8px;
  }

  @media print {
    body { background: white; padding: 0; }
    h1, .form-card, .btn-row, .list-title { display: none !important; }
    #slide-list { display: block !important; max-width: 100%; }
    .slide { page-break-after: always; box-shadow: none; border-radius: 0; }
  }
</style>
</head>
<body>

<h1>🌱 かんさつきろくアプリ</h1>

<div class="form-card">

  <div class="form-row">
    <label class="field-label">📅 にちじ（日付）</label>
    <input type="date" id="inp-date">
  </div>

  <div class="form-row">
    <label class="field-label">👤 なまえ</label>
    <select id="inp-name">
      <option value="">-- えらんでね --</option>
      <option>りゅう</option>
      <option>ゆう</option>
      <option>こう</option>
      <option>とも</option>
      <option>かず</option>
    </select>
  </div>

  <!-- 写真：label で file input をラップ（iOS Safari で確実） -->
  <div class="form-row">
    <span class="field-label">📷 しゃしん</span>
    <div class="photo-wrap">
      <label class="photo-label-btn" id="photo-label">
        <span class="photo-icon">📷</span>
        <span class="photo-text">ここをタップして写真をえらぶ</span>
        <span class="photo-sub">カメラロールからえらんでね</span>
        <input type="file" id="inp-photo" accept="image/*">
      </label>
    </div>
  </div>

  <!-- Q1 -->
  <div class="form-row">
    <span class="field-label">１ はなは、げんきでしたか？😊</span>
    <div class="choice-group" id="grp-q1">
      <label><input type="radio" name="q1" value="①げんきだった"><span>① げんきだった</span></label>
      <label><input type="radio" name="q1" value="②げんきがなかった"><span>② げんきがなかった</span></label>
    </div>
  </div>

  <!-- Q2 -->
  <div class="form-row">
    <span class="field-label">２ はなは、おおきくなっていましたか？📏</span>
    <div class="choice-group" id="grp-q2">
      <label><input type="radio" name="q2" value="①おおきくなっていた"><span>① おおきくなっていた</span></label>
      <label><input type="radio" name="q2" value="②かわらない"><span>② かわらない</span></label>
      <label><input type="radio" name="q2" value="③ちいさくなっていた"><span>③ ちいさくなっていた</span></label>
    </div>
  </div>

  <!-- Q3 -->
  <div class="form-row">
    <span class="field-label">３ はなのかずはふえていましたか？🌸</span>
    <div class="choice-group" id="grp-q3">
      <label><input type="radio" name="q3" value="①ふえていた"><span>① ふえていた</span></label>
      <label><input type="radio" name="q3" value="②かわらない"><span>② かわらない</span></label>
      <label><input type="radio" name="q3" value="③へっていた"><span>③ へっていた</span></label>
    </div>
  </div>

  <!-- Q4 -->
  <div class="form-row">
    <label class="field-label" for="inp-free">４ じゆうきじゅつ</label>
    <textarea id="inp-free" placeholder="かんじたことや、きがついたことをかいてね"></textarea>
  </div>

  <div class="btn-row">
    <button class="btn btn-green" onclick="addSlide()">✅ かくにんしてついかする</button>
    <button class="btn btn-red"   onclick="clearForm()">🗑 クリア</button>
  </div>
</div>

<div id="slide-list"></div>

<div class="btn-row" style="max-width:700px;margin:0 auto 24px;">
  <button class="btn btn-orange" onclick="exportAll()">💾 ファイルにほぞん</button>
  <button class="btn btn-blue"   onclick="document.getElementById('inp-load').click()">📂 ファイルをひらく</button>
  <button class="btn btn-purple" onclick="window.print()">🖨 PDFにする</button>
  <input type="file" id="inp-load" accept=".json" style="display:none" onchange="loadJSON(event)">
</div>

<script>
(function() {
  var slides = [];
  var photoDataUrl = null;

  // ── 初期日付 ──
  document.getElementById('inp-date').value = new Date().toISOString().slice(0,10);

  // ── 写真選択（label>input[file] 方式） ──
  document.getElementById('inp-photo').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      photoDataUrl = ev.target.result;
      var lbl = document.getElementById('photo-label');
      lbl.innerHTML = '<img src="' + photoDataUrl + '" alt="写真"><span class="photo-sub" style="margin-top:6px;">タップしてえらびなおす</span><input type="file" id="inp-photo" accept="image/*">';
      document.getElementById('inp-photo').addEventListener('change', arguments.callee.bind(this));
      // 再バインド
      document.getElementById('inp-photo').addEventListener('change', function(e2) {
        var f2 = e2.target.files[0]; if (!f2) return;
        var r2 = new FileReader();
        r2.onload = function(ev2) {
          photoDataUrl = ev2.target.result;
          var l2 = document.getElementById('photo-label');
          l2.innerHTML = '<img src="' + photoDataUrl + '" alt="写真"><span class="photo-sub" style="margin-top:6px;">タップしてえらびなおす</span><input type="file" id="inp-photo" accept="image/*">';
        };
        r2.readAsDataURL(f2);
      });
    };
    reader.readAsDataURL(file);
  });

  // ── 選択ボタン（radio change で色変更） ──
  document.querySelectorAll('.choice-group input[type="radio"]').forEach(function(radio) {
    radio.addEventListener('change', function() {
      var grp = this.closest('.choice-group');
      grp.querySelectorAll('label').forEach(function(l) { l.classList.remove('active'); });
      this.closest('label').classList.add('active');
    });
  });

  // ── スライド追加 ──
  window.addSlide = function() {
    var date = document.getElementById('inp-date').value;
    var name = document.getElementById('inp-name').value;
    if (!date) { alert('にちじ（日付）をえらんでね！'); return; }
    if (!name) { alert('なまえをえらんでね！'); return; }
    var q1r = document.querySelector('input[name="q1"]:checked');
    var q2r = document.querySelector('input[name="q2"]:checked');
    var q3r = document.querySelector('input[name="q3"]:checked');
    slides.push({
      date: date,
      name: name,
      photoDataUrl: photoDataUrl,
      q1: q1r ? q1r.value : '',
      q2: q2r ? q2r.value : '',
      q3: q3r ? q3r.value : '',
      free: document.getElementById('inp-free').value.trim()
    });
    renderAll();
    clearForm();
  };

  // ── 全スライド描画 ──
  function renderAll() {
    var c = document.getElementById('slide-list');
    var html = slides.length ? '<div class="list-title">📋 スライドいちらん（' + slides.length + 'まい）</div>' : '';
    for (var i = 0; i < slides.length; i++) html += buildSlide(slides[i], i);
    c.innerHTML = html;
  }

  function buildSlide(s, i) {
    var d = s.date ? new Date(s.date + 'T00:00:00').toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric'}) : '';
    var ph = s.photoDataUrl ? '<img src="' + s.photoDataUrl + '" alt="写真">' : '<div class="no-photo">📷 しゃしんなし</div>';
    return '<div class="slide">'
      + '<div class="slide-header"><span>📅 ' + d + '</span><span>👤 ' + s.name + ' <button class="del-btn" onclick="delSlide(' + i + ')">けす</button></span></div>'
      + '<div class="slide-body">'
      + '<div class="slide-photo">' + ph + '</div>'
      + '<div class="slide-text">'
      + '<div class="obs-item"><span class="obs-q">１ はなは、げんきでしたか？😊</span><span class="obs-a">' + (s.q1||'（みきにゅうりょく）') + '</span></div>'
      + '<div class="obs-item"><span class="obs-q">２ はなは、おおきくなっていましたか？📏</span><span class="obs-a">' + (s.q2||'（みきにゅうりょく）') + '</span></div>'
      + '<div class="obs-item"><span class="obs-q">３ はなのかずはふえていましたか？🌸</span><span class="obs-a">' + (s.q3||'（みきにゅうりょく）') + '</span></div>'
      + '<div class="obs-item" style="flex:1;display:flex;flex-direction:column;"><span class="obs-q">４ じゆうきじゅつ</span><span class="obs-free">' + (s.free||'　') + '</span></div>'
      + '</div></div></div>';
  }

  window.delSlide = function(i) {
    if (!confirm('このスライドをけしますか？')) return;
    slides.splice(i, 1);
    renderAll();
  };

  // ── クリア ──
  window.clearForm = function() {
    document.getElementById('inp-date').value = new Date().toISOString().slice(0,10);
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-free').value = '';
    document.querySelectorAll('.choice-group input[type="radio"]').forEach(function(r){ r.checked = false; });
    document.querySelectorAll('.choice-group label').forEach(function(l){ l.classList.remove('active'); });
    photoDataUrl = null;
    var lbl = document.getElementById('photo-label');
    if (lbl) {
      lbl.innerHTML = '<span class="photo-icon">📷</span><span class="photo-text">ここをタップして写真をえらぶ</span><span class="photo-sub">カメラロールからえらんでね</span><input type="file" id="inp-photo" accept="image/*">';
      document.getElementById('inp-photo').addEventListener('change', function(e) {
        var file = e.target.files[0]; if (!file) return;
        var reader = new FileReader();
        reader.onload = function(ev) {
          photoDataUrl = ev.target.result;
          lbl.innerHTML = '<img src="' + photoDataUrl + '" alt="写真"><span class="photo-sub" style="margin-top:6px;">タップしてえらびなおす</span><input type="file" id="inp-photo" accept="image/*">';
        };
        reader.readAsDataURL(file);
      });
    }
  };

  // ── エクスポート ──
  window.exportAll = function() {
    if (!slides.length) { alert('スライドがまだありません！'); return; }
    var blob = new Blob([JSON.stringify(slides, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'kansatsu_' + new Date().toISOString().slice(0,10) + '.json'; a.click();
    URL.revokeObjectURL(url);
  };

  // ── 読み込み ──
  window.loadJSON = function(e) {
    var file = e.target.files[0]; if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var loaded = JSON.parse(ev.target.result);
        if (!Array.isArray(loaded)) throw 0;
        slides = slides.concat(loaded);
        renderAll();
        alert('✅ ' + loaded.length + 'まいのスライドをよみこみました！');
      } catch(err) { alert('よみこみにしっぱいしました。'); }
    };
    reader.readAsText(file);
  };
})();
</script>
</body>
</html>
